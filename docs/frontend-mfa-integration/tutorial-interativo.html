<title>Checkpoint — como implementar o fluxo de MFA</title>
<style>
  :root {
    --void: #14161b;
    --panel: #1c1f26;
    --panel-raised: #22262f;
    --line: #2a2e37;
    --line-soft: #22252c;
    --paper: #edf0f1;
    --muted: #8991a1;
    --muted-dim: #565c69;
    --front: #ffb238;
    --front-dim: #4a3b1e;
    --back: #6d8cff;
    --back-dim: #232b4a;
    --ok: #35d0a0;
    --ok-dim: #17352b;
    --danger: #ff5d5d;
    --danger-dim: #3a1f22;
    --radius: 10px;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "Consolas", "Liberation Mono", monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--void);
    color: var(--paper);
    font-family: var(--sans);
  }

  .stage {
    max-width: 1180px;
    margin: 0 auto;
    padding: 28px 24px 56px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ---------- Header ---------- */

  .masthead {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--line);
    padding-bottom: 16px;
  }

  .masthead h1 {
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin: 0;
    color: var(--paper);
  }

  .masthead h1 span {
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.06em;
  }

  .masthead .tagline {
    font-size: 13px;
    color: var(--muted);
    max-width: 46ch;
    text-align: right;
  }

  /* ---------- Checkpoint tracker ---------- */

  .tracker {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 4px 2px 10px;
  }

  .gate {
    flex: 1 0 auto;
    min-width: 30px;
    height: 34px;
    border-radius: 6px;
    background: var(--panel);
    border: 1px solid var(--line);
    cursor: pointer;
    position: relative;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .gate:hover { transform: translateY(-1px); }

  .gate .lamp {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted-dim);
    box-shadow: none;
  }

  .gate.done { border-color: var(--ok-dim); background: var(--ok-dim); }
  .gate.done .lamp { background: var(--ok); box-shadow: 0 0 6px var(--ok); }

  .gate.active { border-color: var(--front); background: var(--front-dim); }
  .gate.active .lamp { background: var(--front); box-shadow: 0 0 8px var(--front); }

  .gate:focus-visible {
    outline: 2px solid var(--front);
    outline-offset: 2px;
  }

  /* ---------- Main grid: device + log ---------- */

  .grid {
    display: grid;
    grid-template-columns: 1.35fr 1fr;
    gap: 18px;
    align-items: start;
  }

  @media (max-width: 860px) {
    .grid { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--line);
    background: var(--panel-raised);
  }

  .panel-head .label {
    font-size: 10.5px;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .panel-head .dots { display: flex; gap: 5px; }
  .panel-head .dots span {
    width: 7px; height: 7px; border-radius: 50%; background: var(--line);
  }

  /* ---------- Device mock area ---------- */

  .device-body {
    padding: 26px;
    min-height: 300px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 16px;
  }

  .step-eyebrow {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--front);
  }

  .step-title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.01em;
    text-wrap: balance;
    margin: 0;
  }

  .step-copy {
    font-size: 14.5px;
    line-height: 1.6;
    color: var(--muted);
    max-width: 54ch;
    margin: 0;
  }

  .mock {
    margin-top: 6px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--void);
    padding: 20px;
  }

  .mock .field {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 12px;
  }

  .mock label {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted-dim);
  }

  .mock input {
    background: var(--panel-raised);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 9px 10px;
    color: var(--paper);
    font-size: 13.5px;
    font-family: var(--sans);
  }

  .mock .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--front);
    color: #241a06;
    border: none;
    border-radius: 6px;
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.02em;
    cursor: default;
  }

  .mock .btn.ghost {
    background: transparent;
    color: var(--paper);
    border: 1px solid var(--line);
  }

  .mock .contact-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 0;
    border-bottom: 1px solid var(--line-soft);
    font-size: 13.5px;
  }

  .mock .contact-row:last-child { border-bottom: none; }

  .mock .contact-row .tag {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--back);
    background: var(--back-dim);
    padding: 3px 7px;
    border-radius: 4px;
  }

  .otp-boxes { display: flex; gap: 8px; }
  .otp-boxes .box {
    width: 38px; height: 46px;
    border: 1px solid var(--line);
    background: var(--panel-raised);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-variant-numeric: tabular-nums;
    font-size: 19px;
    font-weight: 700;
    color: var(--paper);
  }
  .otp-boxes .box.filled { border-color: var(--front); color: var(--front); }
  .otp-boxes .box.blank { color: var(--muted-dim); }

  .denied-card {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 14px;
    border-radius: 8px;
    background: var(--danger-dim);
    border: 1px solid #5a2b2f;
  }

  .denied-card .code {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--danger);
    font-weight: 700;
  }

  .denied-card .msg { font-size: 13px; color: var(--paper); margin: 3px 0 0; }

  .success-card {
    display: flex;
    gap: 12px;
    align-items: center;
    padding: 16px;
    border-radius: 8px;
    background: var(--ok-dim);
    border: 1px solid #1f5c47;
  }

  .qr-fake {
    width: 96px; height: 96px;
    border-radius: 6px;
    flex-shrink: 0;
    background: var(--paper);
    padding: 6px;
  }
  .qr-fake canvas { width: 100%; height: 100%; display: block; }

  /* ---------- ownership chips ---------- */

  .ownership {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    font-weight: 700;
    padding: 7px 11px;
    border-radius: 7px;
    border: 1px solid var(--line);
  }

  .chip.back { background: var(--back-dim); color: var(--back); border-color: #33407a; }
  .chip.front { background: var(--front-dim); color: var(--front); border-color: #6b551f; }
  .chip svg { width: 14px; height: 14px; flex-shrink: 0; }

  /* ---------- Network log ---------- */

  .log-body {
    padding: 8px;
    max-height: 420px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .log-empty {
    padding: 30px 14px;
    text-align: center;
    color: var(--muted-dim);
    font-size: 12.5px;
  }

  .entry {
    border-radius: 7px;
    border-left: 3px solid var(--line);
    background: var(--panel-raised);
    padding: 9px 11px;
    font-family: var(--mono);
    font-size: 11.5px;
    line-height: 1.55;
    animation: rise 0.28s ease both;
  }

  @media (prefers-reduced-motion: reduce) {
    .entry { animation: none; }
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .entry.request { border-left-color: var(--front); }
  .entry.response.ok { border-left-color: var(--ok); }
  .entry.response.err { border-left-color: var(--danger); }

  .entry .line1 {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    color: var(--muted);
    margin-bottom: 3px;
  }

  .entry.request .line1 .who { color: var(--front); }
  .entry.response.ok .line1 .who { color: var(--ok); }
  .entry.response.err .line1 .who { color: var(--danger); }

  .entry .method { color: var(--paper); font-weight: 700; }
  .entry .status { font-weight: 700; }
  .entry.response.ok .status { color: var(--ok); }
  .entry.response.err .status { color: var(--danger); }

  .entry pre {
    margin: 4px 0 0;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--paper);
    opacity: 0.85;
  }

  .entry .header-note {
    margin-top: 4px;
    color: var(--back);
    font-size: 11px;
  }

  /* ---------- Controls ---------- */

  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .controls .count {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
    font-variant-numeric: tabular-nums;
  }

  .navbtn {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.03em;
    padding: 10px 20px;
    border-radius: 7px;
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--paper);
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease, transform 0.1s ease;
  }

  .navbtn:hover { border-color: var(--muted); transform: translateY(-1px); }
  .navbtn:active { transform: translateY(0); }
  .navbtn:focus-visible { outline: 2px solid var(--front); outline-offset: 2px; }
  .navbtn:disabled { opacity: 0.35; cursor: default; transform: none; }

  .navbtn.primary { background: var(--front); border-color: var(--front); color: #241a06; }
  .navbtn.primary:hover { border-color: var(--front); filter: brightness(1.06); }

  /* ---------- Summary table (final step) ---------- */

  .cheat {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    font-family: var(--mono);
  }
  .cheat th, .cheat td {
    text-align: left;
    padding: 7px 8px;
    border-bottom: 1px solid var(--line-soft);
    vertical-align: top;
  }
  .cheat th {
    color: var(--muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-size: 10px;
  }
  .cheat td.code { color: var(--danger); white-space: nowrap; }
  .cheat-wrap { overflow-x: auto; }
</style>

<div class="stage">

  <div class="masthead">
    <h1>Checkpoint <span>/ integração de MFA · ae3/auth-security</span></h1>
    <div class="tagline">Cada portão é um passo real da implementação — clique num portão pra pular direto, ou avance na ordem.</div>
  </div>

  <div class="tracker" id="tracker" role="tablist" aria-label="Passos do tutorial"></div>

  <div class="grid">
    <div class="panel">
      <div class="panel-head">
        <span class="label">Tela simulada</span>
        <div class="dots"><span></span><span></span><span></span></div>
      </div>
      <div class="device-body" id="deviceBody"></div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <span class="label">Tráfego HTTP</span>
        <div class="dots"><span></span><span></span><span></span></div>
      </div>
      <div class="log-body" id="logBody"></div>
    </div>
  </div>

  <div class="controls">
    <button class="navbtn" id="prevBtn">← Voltar</button>
    <span class="count" id="countLabel"></span>
    <button class="navbtn primary" id="nextBtn">Avançar →</button>
  </div>

</div>

<script>
(function () {
  "use strict";

  var svgBack = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="6" rx="1"></rect><rect x="3" y="14" width="18" height="6" rx="1"></rect><circle cx="7" cy="7" r="0.8" fill="currentColor" stroke="none"></circle><circle cx="7" cy="17" r="0.8" fill="currentColor" stroke="none"></circle></svg>';
  var svgFront = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="14" rx="1.5"></rect><path d="M3 8h18"></path></svg>';

  function chip(kind, text) {
    var icon = kind === "back" ? svgBack : svgFront;
    var word = kind === "back" ? "Backend" : "Frontend";
    return '<span class="chip ' + kind + '">' + icon + '<span>' + word + ' — ' + text + '</span></span>';
  }

  function req(path, body) {
    return { kind: "request", method: "POST", path: path, body: body || null };
  }
  function reqGet(path) {
    return { kind: "request", method: "GET", path: path, body: null };
  }
  function resOk(status, body, headerNote) {
    return { kind: "response", ok: true, status: status, body: body, headerNote: headerNote || null };
  }
  function resErr(status, body) {
    return { kind: "response", ok: false, status: status, body: body };
  }

  var steps = [];

  // 0 ---------------------------------------------------------------------
  steps.push({
    eyebrow: "Ponto de partida",
    title: "Usuário autenticado, mas sem MFA resolvido",
    copy: "O login (Sanctum, fora deste pacote) já aconteceu. A partir daqui, toda rota protegida pelo pacote passa por dois portões: primeiro \"você tem um fator cadastrado?\", depois \"você provou posse dele nesta sessão?\".",
    device: function () {
      return '' +
        '<div class="mock">' +
          '<div class="field"><label>E-mail</label><input value="ana@empresa.com" readonly></div>' +
          '<div class="field"><label>Senha</label><input type="password" value="••••••••••" readonly></div>' +
          '<span class="btn">Entrar</span>' +
        '</div>';
    },
    log: [],
    chips: [chip("front", "tela de login")]
  });

  // 1 ---------------------------------------------------------------------
  steps.push({
    eyebrow: "Passo 1",
    title: "Primeira rota protegida devolve 403",
    copy: "O front chama qualquer endpoint do pacote (ex.: listar fatores) esperando os dados normais, e recebe bloqueio. O código no corpo do erro é o que decide a próxima tela.",
    device: function () {
      return '' +
        '<div class="denied-card">' +
          '<div>' +
            '<div class="code">MFA_FACTOR_REGISTRATION_REQUIRED</div>' +
            '<p class="msg">Cadastre um fator de verificação antes de continuar.</p>' +
          '</div>' +
        '</div>';
    },
    log: [
      reqGet("/auth-security/mfa/factors"),
      resErr(403, { message: "Cadastre um fator de verificação antes de continuar.", code: "MFA_FACTOR_REGISTRATION_REQUIRED" })
    ],
    chips: [
      chip("back", "EnsureMustRegisterFactorCompleted bloqueia (must_register_factor=true)"),
      chip("front", "interceptor lê o code e redireciona pra tela de cadastro")
    ]
  });

  // 2 ---------------------------------------------------------------------
  steps.push({
    eyebrow: "Passo 2",
    title: "Front busca os contatos disponíveis",
    copy: "Nunca mostra o e-mail/telefone cru — só a versão mascarada, mais um contact_token opaco (HMAC) que representa aquele contato sem expor o dado real.",
    device: function () {
      return '' +
        '<div class="mock">' +
          '<div class="contact-row"><span>a****@empresa.com</span><span class="tag">email</span></div>' +
          '<div class="contact-row"><span>Aplicativo autenticador</span><span class="tag">authenticator_app</span></div>' +
        '</div>';
    },
    log: [
      reqGet("/auth-security/mfa/contacts"),
      resOk(200, { data: [
        { channel: "email", masked_identifier: "a****@empresa.com", label: "E-mail", contact_token: "9f2a...c31" }
      ], meta: {} })
    ],
    chips: [
      chip("back", "MfaContactController + IdentifierMasker + ContactTokenizer"),
      chip("front", "renderiza opções de canal a partir do contact_token")
    ]
  });

  // 3 ---------------------------------------------------------------------
  steps.push({
    eyebrow: "Passo 3",
    title: "Usuário escolhe e-mail, cadastro começa",
    copy: "O front nunca manda o identifier em texto puro — só o contact_token recebido no passo anterior. O backend resolve o identifier real internamente e dispara o OTP.",
    device: function () {
      return '' +
        '<div class="mock">' +
          '<div class="contact-row"><span>a****@empresa.com</span><span class="tag">selecionado</span></div>' +
          '<span class="btn" style="margin-top:10px;">Enviar código para este e-mail</span>' +
        '</div>';
    },
    log: [
      req("/auth-security/mfa/factors", { type: "email", contact_token: "9f2a...c31", name: "E-mail principal" }),
      resOk(201, { data: { id: 14, type: "email", masked_identifier: "a****@empresa.com", confirmed_at: null }, meta: { enrollment_started: true } })
    ],
    chips: [
      chip("back", "EnrollOtpFactorAction cria Factor(confirmed_at=null) + envia OTP"),
      chip("front", "guarda o factor_id (14) e abre a tela de confirmação")
    ]
  });

  // 4 ---------------------------------------------------------------------
  steps.push({
    eyebrow: "Passo 4",
    title: "Usuário confirma o código recebido",
    copy: "Com o código de 6 dígitos que chegou no e-mail, o front confirma o fator. É aqui que ele deixa de ser \"pendente\" e passa a valer pra desafios futuros.",
    device: function () {
      return '' +
        '<div class="mock">' +
          '<label style="display:block;margin-bottom:8px;">Código enviado para a****@empresa.com</label>' +
          '<div class="otp-boxes">' +
            '<div class="box filled">4</div><div class="box filled">1</div><div class="box filled">2</div>' +
            '<div class="box filled">9</div><div class="box filled">0</div><div class="box filled">7</div>' +
          '</div>' +
          '<span class="btn" style="margin-top:14px;">Confirmar</span>' +
        '</div>';
    },
    log: [
      req("/auth-security/mfa/factors/14/confirm", { code: "412907" }),
      resOk(200, { data: { id: 14, type: "email", confirmed_at: "2026-07-02T14:05:11Z" }, meta: {} })
    ],
    chips: [
      chip("back", "ConfirmFactorEnrollmentAction confirma + zera must_register_factor"),
      chip("front", "transiciona do estado \"precisa cadastrar\" pra \"precisa verificar\"")
    ]
  });

  // 5 ---------------------------------------------------------------------
  steps.push({
    eyebrow: "Passo 5",
    title: "Mesma rota protegida, bloqueio diferente",
    copy: "Ter um fator não é o mesmo que já ter provado posse dele nesta sessão. O front tenta de novo a rota original e cai num segundo portão — este exige o desafio, não o cadastro.",
    device: function () {
      return '' +
        '<div class="denied-card">' +
          '<div>' +
            '<div class="code">MFA_REQUIRED</div>' +
            '<p class="msg">Verificação em duas etapas necessária para continuar.</p>' +
          '</div>' +
        '</div>';
    },
    log: [
      reqGet("/auth-security/mfa/factors"),
      resErr(403, { message: "Verificação em duas etapas necessária para continuar.", code: "MFA_REQUIRED" })
    ],
    chips: [
      chip("back", "EnsureMfaCompleted não encontra X-Mfa-Session-Token"),
      chip("front", "interceptor redireciona pra tela de desafio, não de cadastro")
    ]
  });

  // 6 ---------------------------------------------------------------------
  steps.push({
    eyebrow: "Passo 6",
    title: "Front lista fatores e dispara o desafio",
    copy: "Agora GET /mfa/factors já retorna algo — o fator confirmado no passo 4. O front dispara o challenge nele, que envia um novo código.",
    device: function () {
      return '' +
        '<div class="mock">' +
          '<div class="contact-row"><span>a****@empresa.com</span><span class="tag">email</span></div>' +
          '<span class="btn" style="margin-top:10px;">Receber código</span>' +
        '</div>';
    },
    log: [
      reqGet("/auth-security/mfa/factors"),
      resOk(200, { data: [{ id: 14, type: "email", masked_identifier: "a****@empresa.com" }], meta: {} }),
      req("/auth-security/mfa/factors/14/challenge"),
      resOk(200, { data: { challenge_id: "14", channel: "email", masked_identifier: "a****@empresa.com", expires_at: "…", resend_available_at: "…" }, meta: {} })
    ],
    chips: [
      chip("back", "SendOtpAction gera e envia novo código OTP"),
      chip("front", "mostra countdown de reenvio usando resend_available_at")
    ]
  });

  // 7 ---------------------------------------------------------------------
  steps.push({
    eyebrow: "Passo 7",
    title: "Usuário digita o código e verifica",
    copy: "Sucesso aqui devolve um mfa_session_token — só no corpo da resposta, nunca como header. É o front que precisa guardar esse valor.",
    device: function () {
      return '' +
        '<div class="mock">' +
          '<label style="display:block;margin-bottom:8px;">Digite o código recebido</label>' +
          '<div class="otp-boxes">' +
            '<div class="box filled">7</div><div class="box filled">7</div><div class="box filled">1</div>' +
            '<div class="box filled">3</div><div class="box filled">4</div><div class="box filled">2</div>' +
          '</div>' +
          '<span class="btn" style="margin-top:14px;">Verificar</span>' +
        '</div>';
    },
    log: [
      req("/auth-security/mfa/verify", { factor_id: 14, factor_type: "email", code: "771342" }),
      resOk(200, { data: { mfa_session_token: "6f1e...9ab", expires_at: "2026-07-02T22:05:11Z" }, meta: {} })
    ],
    chips: [
      chip("back", "MfaSessionService::create() grava token→user_id no cache"),
      chip("front", "extrai data.mfa_session_token e guarda em storage seguro")
    ]
  });

  // 8 ---------------------------------------------------------------------
  steps.push({
    eyebrow: "Passo 8",
    title: "Acesso liberado",
    copy: "O front repete a chamada original, agora anexando o header X-Mfa-Session-Token manualmente. É a única forma do backend saber que a sessão passou pelo desafio.",
    device: function () {
      return '' +
        '<div class="success-card">' +
          '<div>' +
            '<div class="step-eyebrow" style="color:var(--ok);">Liberado</div>' +
            '<p class="msg" style="color:var(--paper);margin-top:4px;">Bem-vinda, Ana. Acesso concedido às rotas protegidas.</p>' +
          '</div>' +
        '</div>';
    },
    log: [
      reqGet("/auth-security/mfa/factors"),
      { kind: "note", text: "Header enviado nesta chamada:" , sub: "X-Mfa-Session-Token: 6f1e...9ab" },
      resOk(200, { data: [{ id: 14, type: "email", confirmed_at: "2026-07-02T14:05:11Z" }], meta: {} })
    ],
    chips: [
      chip("back", "EnsureMfaCompleted valida o token no cache e libera"),
      chip("front", "interceptor injeta X-Mfa-Session-Token em toda chamada seguinte")
    ]
  });

  // 9 ---------------------------------------------------------------------
  steps.push({
    eyebrow: "Bônus",
    title: "Semanas depois: adicionar um segundo fator",
    copy: "Com pelo menos um fator confirmado, o bloqueio de cadastro nem existe mais — o usuário acessa essa tela livremente, dentro das configurações da conta, a qualquer momento.",
    device: function () {
      return '' +
        '<div class="mock">' +
          '<label style="display:block;margin-bottom:10px;">Escanear com o aplicativo autenticador</label>' +
          '<div style="display:flex;gap:14px;align-items:center;">' +
            '<div class="qr-fake"><canvas width="84" height="84" id="qrCanvas"></canvas></div>' +
            '<div class="otp-boxes">' +
              '<div class="box blank">·</div><div class="box blank">·</div><div class="box blank">·</div>' +
              '<div class="box blank">·</div><div class="box blank">·</div><div class="box blank">·</div>' +
            '</div>' +
          '</div>' +
        '</div>';
    },
    log: [
      req("/auth-security/mfa/factors", { type: "authenticator_app", holder_name: "Ana Souza", name: "Celular pessoal" }),
      resOk(201, { data: { factor_id: 21, secret: "JBSWY3DPEHPK3PXP", otpauth_uri: "otpauth://totp/...", qr_code_svg: "<svg>…</svg>" }, meta: {} })
    ],
    chips: [
      chip("back", "EnrollTotpFactorAction gera segredo + QR — sem contact_token"),
      chip("front", "mesma tela de confirmação de código, reaproveitada do passo 4")
    ],
    onRender: function () {
      var canvas = document.getElementById("qrCanvas");
      if (!canvas) return;
      var ctx = canvas.getContext("2d");
      var cells = 12;
      var size = canvas.width / cells;
      var seed = 42;
      function rand() { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; }
      ctx.fillStyle = "#14161b";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#14161b";
      for (var y = 0; y < cells; y++) {
        for (var x = 0; x < cells; x++) {
          var isFinder = (x < 3 && y < 3) || (x > cells - 4 && y < 3) || (x < 3 && y > cells - 4);
          if (isFinder || rand() > 0.56) {
            ctx.fillRect(x * size, y * size, size - 1, size - 1);
          }
        }
      }
    }
  });

  // 10 ---------------------------------------------------------------------
  steps.push({
    eyebrow: "Referência",
    title: "Tabela de códigos — cola isso no seu interceptor",
    copy: "Todo erro do pacote segue { message, code }. Um único interceptor lendo esse code decide a tela, sem espalhar lógica de HTTP pelas telas de negócio.",
    device: function () {
      return '' +
        '<div class="cheat-wrap">' +
        '<table class="cheat">' +
        '<tr><th>code</th><th>http</th><th>ação do front</th></tr>' +
        '<tr><td class="code">MFA_FACTOR_REGISTRATION_REQUIRED</td><td>403</td><td>tela de cadastro de fator</td></tr>' +
        '<tr><td class="code">MFA_REQUIRED</td><td>403</td><td>tela de desafio MFA</td></tr>' +
        '<tr><td class="code">ACCOUNT_LOCKED</td><td>423</td><td>tela de conta bloqueada</td></tr>' +
        '<tr><td class="code">PASSWORD_EXPIRED</td><td>403</td><td>troca de senha obrigatória</td></tr>' +
        '<tr><td class="code">INVALID_CODE</td><td>422</td><td>erro inline no campo de código</td></tr>' +
        '<tr><td class="code">RESEND_RATE_LIMITED</td><td>429</td><td>desabilita botão de reenvio</td></tr>' +
        '</table>' +
        '</div>';
    },
    log: [],
    chips: [chip("front", "interceptor único, sem if/else espalhado pelas telas")]
  });

  var current = 0;
  var tracker = document.getElementById("tracker");
  var deviceBody = document.getElementById("deviceBody");
  var logBody = document.getElementById("logBody");
  var prevBtn = document.getElementById("prevBtn");
  var nextBtn = document.getElementById("nextBtn");
  var countLabel = document.getElementById("countLabel");

  function buildTracker() {
    tracker.innerHTML = "";
    steps.forEach(function (s, i) {
      var b = document.createElement("button");
      b.className = "gate";
      b.setAttribute("role", "tab");
      b.setAttribute("aria-label", "Passo " + (i + 1) + ": " + s.title);
      b.innerHTML = '<span class="lamp"></span>';
      b.addEventListener("click", function () { goTo(i); });
      tracker.appendChild(b);
    });
  }

  function renderLogEntry(item) {
    if (item.kind === "note") {
      var div = document.createElement("div");
      div.className = "entry request";
      div.innerHTML = '<div class="line1"><span class="who">Front → Back</span></div>' +
        '<div class="header-note">' + item.text + '<br>' + item.sub + '</div>';
      return div;
    }
    var el = document.createElement("div");
    if (item.kind === "request") {
      el.className = "entry request";
      el.innerHTML =
        '<div class="line1"><span class="who">Front envia</span><span class="method">' + item.method + '</span></div>' +
        '<div>' + item.path + '</div>' +
        (item.body ? '<pre>' + JSON.stringify(item.body, null, 2) + '</pre>' : '');
    } else {
      var okness = item.ok ? "ok" : "err";
      el.className = "entry response " + okness;
      el.innerHTML =
        '<div class="line1"><span class="who">Back responde</span><span class="status">' + item.status + '</span></div>' +
        '<pre>' + JSON.stringify(item.body, null, 2) + '</pre>';
    }
    return el;
  }

  function render() {
    var step = steps[current];

    tracker.querySelectorAll(".gate").forEach(function (g, i) {
      g.classList.toggle("done", i < current);
      g.classList.toggle("active", i === current);
    });

    deviceBody.innerHTML =
      '<div class="step-eyebrow">' + step.eyebrow + '</div>' +
      '<h2 class="step-title">' + step.title + '</h2>' +
      '<p class="step-copy">' + step.copy + '</p>' +
      step.device() +
      '<div class="ownership">' + step.chips.join("") + '</div>';

    if (step.onRender) step.onRender();

    logBody.innerHTML = "";
    if (step.log.length === 0) {
      var empty = document.createElement("div");
      empty.className = "log-empty";
      empty.textContent = "Nenhuma chamada HTTP neste passo ainda.";
      logBody.appendChild(empty);
    } else {
      step.log.forEach(function (item) {
        logBody.appendChild(renderLogEntry(item));
      });
    }

    prevBtn.disabled = current === 0;
    nextBtn.textContent = current === steps.length - 1 ? "Recomeçar ↺" : "Avançar →";
    countLabel.textContent = "Passo " + (current + 1) + " de " + steps.length;
  }

  function goTo(i) {
    current = Math.max(0, Math.min(steps.length - 1, i));
    render();
  }

  prevBtn.addEventListener("click", function () { goTo(current - 1); });
  nextBtn.addEventListener("click", function () {
    if (current === steps.length - 1) { goTo(0); return; }
    goTo(current + 1);
  });

  document.addEventListener("keydown", function (e) {
    if (e.key === "ArrowRight") goTo(current + 1);
    if (e.key === "ArrowLeft") goTo(current - 1);
  });

  buildTracker();
  render();
})();
</script>
